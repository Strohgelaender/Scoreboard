<!doctype html>
<html lang="en">
	<head>
		<title>FLL Vertical</title>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<link rel="stylesheet" type="text/css" href="/css/default.css" media="screen" />
		<link rel="stylesheet" type="text/css" href="/css/fll_v.css" media="screen" />
		<script src="/scripts/fll.js" defer></script>
	</head>
	<body>
	<div id="container">
		<!-- Top team box -->
		<div id="aTeamBox" class="teamBox topBox" style="display: none">
			<div class="teamInfo">
				<div class="teamName" id="aTeamName">Team Name</div>
				<div class="teamInstitution" id="aTeamInstitution">Institution</div>
			</div>
			<img id="aTeamLogo" class="teamLogo" alt="Team Logo" style="display: none" />
		</div>

		<!-- Bottom team box -->
		<div id="bTeamBox" class="teamBox bottomBox" style="display: none">
			<div class="teamInfo">
				<div class="teamName" id="bTeamName">Team Name</div>
				<div class="teamInstitution" id="bTeamInstitution">Institution</div>
			</div>
			<img id="bTeamLogo" class="teamLogo" alt="Team Logo" style="display: none" />
		</div>
	</div>
	</body>
</html>
